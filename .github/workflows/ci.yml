name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  build-test:
    uses: Plasius-LTD/plasius-ltd-site/.github/workflows/package-ci.yml@main
    with:
      run_typecheck: false
      run_audit: false
      build_command: "npm run build && npm run pack:check"
      test_command: npm run test:coverage
    secrets: inherit
