name: Release npm Package

on:
  workflow_dispatch:
    inputs:
      package_directory:
        description: "Path to package directory"
        required: true
        type: string
        default: "packages/core"
      changelog_path:
        description: "Path to the package changelog"
        required: true
        type: string
        default: "packages/core/CHANGELOG.md"
      tag_prefix:
        description: "Release tag prefix for this package"
        required: true
        type: string
        default: "ui-foundry-core-v"
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - none
      preid:
        description: "Pre-release id (e.g. beta, rc). Leave blank for stable"
        required: false
        type: string
      npm_tag:
        description: "npm dist-tag"
        required: false
        type: string
        default: "latest"
      run_tests:
        description: "Run package tests before publishing"
        required: false
        type: boolean
        default: true
      run_build:
        description: "Run package build before publishing"
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: npm-release-${{ github.ref }}-${{ inputs.package_directory }}
  cancel-in-progress: false

jobs:
  prepare_release:
    uses: ./.github/workflows/release-prepare.yml
    with:
      bump: ${{ inputs.bump }}
      preid: ${{ inputs.preid }}
      package_directory: ${{ inputs.package_directory }}
      changelog_path: ${{ inputs.changelog_path }}
      tag_prefix: ${{ inputs.tag_prefix }}
    secrets: inherit

  publish:
    name: Publish package to npm
    needs: prepare_release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Use prepared release metadata
        id: release
        run: |
          set -euo pipefail

          PUBLISHED="${{ needs.prepare_release.outputs.published }}"
          SHOULD_PUBLISH="true"
          SKIP_REASON=""
          if [ "${PUBLISHED}" = "true" ]; then
            SHOULD_PUBLISH="false"
            SKIP_REASON="Package version ${{ needs.prepare_release.outputs.version }} is already published; nothing to release."
          fi

          {
            echo "package_name=${{ needs.prepare_release.outputs.name }}"
            echo "release_version=${{ needs.prepare_release.outputs.version }}"
            echo "release_tag=${{ needs.prepare_release.outputs.tag }}"
            echo "flags=${{ needs.prepare_release.outputs.flags }}"
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "skip_reason=${SKIP_REASON}"
          } >> "$GITHUB_OUTPUT"

      - name: Skip when package version is already published
        if: steps.release.outputs.should_publish != 'true'
        run: echo "${{ steps.release.outputs.skip_reason }}"

      - name: Install repo dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: npm ci --no-fund --no-audit --legacy-peer-deps

      - name: Run package tests
        if: steps.release.outputs.should_publish == 'true' && inputs.run_tests
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ inputs.package_directory }}"
          HAS_TEST=$(node -e "const p=require('./${PACKAGE_DIR}/package.json'); process.stdout.write(p.scripts && p.scripts.test ? 'true' : 'false')")
          if [ "${HAS_TEST}" = "true" ]; then
            npm --prefix "${PACKAGE_DIR}" run test
          else
            echo "No test script found in ${PACKAGE_DIR}/package.json; skipping tests"
          fi

      - name: Run package build
        if: steps.release.outputs.should_publish == 'true' && inputs.run_build
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ inputs.package_directory }}"
          HAS_BUILD=$(node -e "const p=require('./${PACKAGE_DIR}/package.json'); process.stdout.write(p.scripts && p.scripts.build ? 'true' : 'false')")
          if [ "${HAS_BUILD}" = "true" ]; then
            npm --prefix "${PACKAGE_DIR}" run build
          else
            echo "No build script found in ${PACKAGE_DIR}/package.json; skipping build"
          fi

      - name: Create release tag from main
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout -B main origin/main

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            if gh release view "${TAG}" >/dev/null 2>&1; then
              IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
              if [ "${IS_DRAFT}" != "true" ]; then
                echo "Published release ${TAG} already exists; reusing the existing tag."
                exit 0
              fi
            fi
            git push origin ":refs/tags/${TAG}"
          fi

          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release draft
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
        run: gh release create "${TAG}" --title "Release ${TAG}" --generate-notes --verify-tag --draft

      - name: Publish package
        if: steps.release.outputs.should_publish == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          FLAGS: ${{ steps.release.outputs.flags }}
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ inputs.package_directory }}"
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required" >&2
            exit 1
          fi

          npm --prefix "${PACKAGE_DIR}" publish ${FLAGS} --provenance --tag "${{ inputs.npm_tag }}" --registry https://registry.npmjs.org

      - name: Publish GitHub Release
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
        run: gh release edit "${TAG}" --draft=false --latest
