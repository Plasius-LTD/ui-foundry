name: Release npm Package

on:
  workflow_dispatch:
    inputs:
      package_directory:
        description: "Path to package directory"
        required: true
        type: string
        default: "packages/core"
      changelog_path:
        description: "Path to the package changelog"
        required: true
        type: string
        default: "packages/core/CHANGELOG.md"
      tag_prefix:
        description: "Release tag prefix for this package"
        required: true
        type: string
        default: "ui-foundry-core-v"
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - none
      preid:
        description: "Pre-release id (e.g. beta, rc). Leave blank for stable"
        required: false
        type: string
      run_tests:
        description: "Run package tests before publishing"
        required: false
        type: boolean
        default: true
      run_build:
        description: "Run package build before publishing"
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: npm-release-${{ github.repository }}-${{ inputs.package_directory }}
  cancel-in-progress: false

jobs:
  prepare_release:
    uses: ./.github/workflows/release-prepare.yml
    with:
      bump: ${{ inputs.bump }}
      preid: ${{ inputs.preid }}
      release_prep_app_client_id: ${{ vars.RELEASE_PREP_APP_CLIENT_ID }}
      package_directory: ${{ inputs.package_directory }}
      changelog_path: ${{ inputs.changelog_path }}
      tag_prefix: ${{ inputs.tag_prefix }}
    secrets: inherit

  publish:
    name: Publish package to npm
    needs: prepare_release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout prepared release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.commit_sha }}
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Use prepared release metadata
        id: release
        run: |
          set -euo pipefail

          PUBLISHED="${{ needs.prepare_release.outputs.published }}"
          SHOULD_PUBLISH_NPM="true"
          SKIP_REASON=""
          if [ "${PUBLISHED}" = "true" ]; then
            SHOULD_PUBLISH_NPM="false"
            SKIP_REASON="Package version ${{ needs.prepare_release.outputs.version }} is already published; nothing to release."
          fi

          {
            echo "package_name=${{ needs.prepare_release.outputs.name }}"
            echo "release_version=${{ needs.prepare_release.outputs.version }}"
            echo "release_tag=${{ needs.prepare_release.outputs.tag }}"
            echo "flags=${{ needs.prepare_release.outputs.flags }}"
            echo "should_publish_npm=${SHOULD_PUBLISH_NPM}"
            echo "should_finalize_release=true"
            echo "skip_reason=${SKIP_REASON}"
          } >> "$GITHUB_OUTPUT"

      - name: Skip when package version is already published
        if: steps.release.outputs.should_publish_npm != 'true'
        run: echo "${{ steps.release.outputs.skip_reason }}"

      - name: Install repo dependencies
        if: steps.release.outputs.should_finalize_release == 'true'
        run: npm ci --no-fund --no-audit --legacy-peer-deps

      - name: Run package tests
        if: steps.release.outputs.should_finalize_release == 'true' && inputs.run_tests
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ inputs.package_directory }}"
          if node -e "const p=require('./${PACKAGE_DIR}/package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            npm --prefix "${PACKAGE_DIR}" run test
          else
            echo "No test script found in ${PACKAGE_DIR}/package.json; skipping tests"
          fi

      - name: Run package build
        if: steps.release.outputs.should_finalize_release == 'true' && inputs.run_build
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ inputs.package_directory }}"
          if node -e "const p=require('./${PACKAGE_DIR}/package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm --prefix "${PACKAGE_DIR}" run build
          else
            echo "No build script found in ${PACKAGE_DIR}/package.json; skipping build"
          fi

      - name: Generate SBOM (CycloneDX)
        if: steps.release.outputs.should_finalize_release == 'true'
        run: npm --prefix "${{ inputs.package_directory }}" sbom --sbom-format=cyclonedx --sbom-type=library --omit dev > sbom.cdx.json

      - name: Attest SBOM
        if: steps.release.outputs.should_finalize_release == 'true' && hashFiles('sbom.cdx.json') != ''
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: sbom.cdx.json

      - name: Ensure release tag points at prepared commit
        if: steps.release.outputs.should_finalize_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
          PUBLISHED: ${{ needs.prepare_release.outputs.published }}
        run: |
          set -euo pipefail

          HEAD_SHA="$(git rev-parse HEAD)"
          git fetch origin --tags --force

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
            TAG_SHA="$(git rev-list -n 1 "${TAG}")"
            if [ "${TAG_SHA}" = "${HEAD_SHA}" ]; then
              echo "Tag ${TAG} already points at prepared commit ${HEAD_SHA}."
              exit 0
            fi

            if [ "${PUBLISHED}" = "true" ]; then
              echo "Package is already published; preserving existing tag ${TAG} at ${TAG_SHA}."
              exit 0
            fi

            if gh release view "${TAG}" >/dev/null 2>&1; then
              IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
              if [ "${IS_DRAFT}" != "true" ]; then
                echo "Release ${TAG} already exists and is published at ${TAG_SHA}; cut a new version instead." >&2
                exit 1
              fi
            fi

            echo "Replacing stale unpublished tag ${TAG}."
            git push origin ":refs/tags/${TAG}"
            git tag -d "${TAG}" >/dev/null 2>&1 || true
          elif [ "${PUBLISHED}" = "true" ]; then
            echo "Package is already published but tag ${TAG} is missing; cannot safely recreate a release tag after npm publication." >&2
            exit 1
          fi

          git tag "${TAG}" "${HEAD_SHA}"
          git push origin "${TAG}"

      - name: Create GitHub Release draft
        if: steps.release.outputs.should_finalize_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
          PREID: ${{ inputs.preid }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
            if [ "${IS_DRAFT}" != "true" ]; then
              echo "Release ${TAG} is already published; nothing to recover."
              exit 0
            fi
            exit 0
          fi

          ARGS=(--title "Release ${TAG}" --generate-notes --verify-tag --draft)
          if [ -n "${PREID}" ]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${TAG}" "${ARGS[@]}"

      - name: Publish package
        if: steps.release.outputs.should_publish_npm == 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          FLAGS: ${{ steps.release.outputs.flags }}
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ inputs.package_directory }}"
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required" >&2
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping duplicate publish."
            exit 0
          fi

          npm publish "${PACKAGE_DIR}" ${FLAGS} --provenance --registry https://registry.npmjs.org

      - name: Publish GitHub Release
        if: steps.release.outputs.should_finalize_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.release_tag }}
          PREID: ${{ inputs.preid }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Expected draft release ${TAG} to exist before publication." >&2
            exit 1
          fi

          if [ -n "${PREID}" ]; then
            gh release edit "${TAG}" --draft=false --prerelease
          else
            gh release edit "${TAG}" --draft=false --latest
          fi
